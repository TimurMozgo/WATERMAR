<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | WaterMark</title>
    <link rel="stylesheet" href="./catalog.css">
    <!-- Иконки Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Шапка сайта -->
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img src="./img/watermar logo.jpg" alt="WaterMark">
            </div>

            <div class="nav-controls">
                <!-- Кнопка корзины -->
                <button class="cart-btn" onclick="toggleCart()">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </button>
                
                <!-- Кнопка меню -->
                <button class="menu-btn" onclick="toggleMenu()">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Секция каталога -->
    <section class="catalog-section" id="catalog">
        <div class="container">
            <h2 class="section-title">Наш каталог</h2>
            
            <div class="category-filter">
                <button class="category-btn active" data-category="all">Все</button>
                <button class="category-btn" data-category="filters">Оборудование</button>
                <button class="category-btn" data-category="osmosis">Расходные материалы</button>
                <button class="category-btn" data-category="industrial">Услуги</button>
            </div>

            <div class="product-grid" id="product-container">
                <!-- Товары грузятся из catalog.js -->
            </div>
        </div>
    </section>

    <!-- ЭЛЕМЕНТЫ ИНТЕРФЕЙСА -->
    
    <!-- 1. Темный фон (Оверлей) -->
    <div id="overlay" class="overlay"></div>

    <!-- 2. Корзина -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Ваша корзина</h2>
            <button class="close-btn" onclick="toggleCart()">&times;</button>
        </div>

        <div id="cart-items" class="cart-items">
            <!-- Товары грузятся через JS -->
        </div>

        <div class="cart-footer">
            <div class="total-row">
                <span class="total-label">Итого:</span>
                <div class="total-amount-box">
                    <span id="cart-total">0</span>
                    <span class="currency-symbol">₴</span>
                </div>
            </div>
            <button class="checkout-btn">Оформить заказ</button>
        </div>
    </div>

    <!-- 3. НОВОЕ ПОЛНОЭКРАННОЕ МЕНЮ -->
    <div id="mobile-menu" class="mobile-menu-overlay">
        <button class="close-mobile-menu" onclick="toggleMenu()">&times;</button>
        
        <div class="mobile-menu-content">
            <nav class="mobile-navigation">
                <a href="index.html" class="mobile-link">Главная</a>
                
                <!-- Активный раздел Каталог -->
                <a href="catalog.html" class="mobile-link catalog-highlight">
                    <span>Каталог</span>
                    <div class="active-dot"></div>
                </a>
            </nav>
        </div>
    </div>

    <!-- Инициализация иконок -->
    <script>
      lucide.createIcons();
    </script>

    <!-- Скрипты -->
    <script src="script.js"></script> 
    <script src="catalog.js"></script>
</body>
</html>
